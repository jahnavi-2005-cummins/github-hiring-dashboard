spring:
  application:
    name: github-analyzer

  datasource:
    # createDatabaseIfNotExist=true will auto-create the schema if missing
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:github_analyzer}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: aeiou20*
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true   # Keeps Hibernate session open during view rendering — prevents LazyInitializationException
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:github-analyzer-secret-key-change-in-production-minimum-32-chars-long}
    expiration: 86400000   # 24 hours

  github:
    api-url: https://api.github.com
    # Optional GitHub token for higher rate limits (5000/hr instead of 60/hr)
    token: ${GITHUB_TOKEN:}

  scoring:
    weights:
      skills-match: 0.30
      activity: 0.20
      repo-quality: 0.20
      open-source: 0.15
      consistency: 0.15

  thresholds:
    selected: 80
    consider: 60

logging:
  level:
    com.analyzer: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
